<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Practice | Satyam Mall</title>
  <meta name="description" content="Interactive DSA practice platform with code execution, progress tracking, and daily challenges." />
  <link rel="icon" href="pic.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dsa.css" />
  <!-- Monaco Editor CDN -->
  <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.css" />
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-container">
      <a href="/" class="back-link">← Back to Portfolio</a>
      <h1>DSA Practice Arena</h1>
      <div class="header-stats">
        <div class="stat-item">
          <span class="stat-label">Solved</span>
          <span class="stat-value" id="solvedCount">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Total</span>
          <span class="stat-value" id="totalCount">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Progress</span>
          <span class="stat-value" id="progressPercent">0%</span>
        </div>
      </div>
    </div>
  </header>

  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3>Categories</h3>
        <button class="category-btn active" data-category="all">All Problems</button>
        <button class="category-btn" data-category="daily">Daily Tasks</button>
        <button class="category-btn" data-category="arrays">Arrays</button>
        <button class="category-btn" data-category="patterns">Patterns</button>
        <button class="category-btn" data-category="basics">Basics</button>
      </div>

      <div class="sidebar-section">
        <h3>Difficulty Filter</h3>
        <label class="filter-checkbox">
          <input type="checkbox" value="Easy" checked />
          <span>Easy</span>
        </label>
        <label class="filter-checkbox">
          <input type="checkbox" value="Medium" checked />
          <span>Medium</span>
        </label>
        <label class="filter-checkbox">
          <input type="checkbox" value="Hard" checked />
          <span>Hard</span>
        </label>
      </div>

      <div class="sidebar-section">
        <h3>Status</h3>
        <label class="filter-checkbox">
          <input type="checkbox" value="solved" />
          <span>✓ Solved</span>
        </label>
        <label class="filter-checkbox">
          <input type="checkbox" value="unsolved" checked />
          <span>○ Unsolved</span>
        </label>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Problems List View -->
      <div class="view" id="listView">
        <div class="list-header">
          <h2>Problems</h2>
          <p id="listCount">Select a problem to start</p>
        </div>
        <div class="problem-list" id="problemList"></div>
      </div>

      <!-- Problem Detail View -->
      <div class="view hidden" id="detailView">
        <button class="back-btn" id="backBtn">← Back</button>

        <div class="problem-header">
          <h2 id="problemTitle">Problem Title</h2>
          <div class="problem-meta">
            <span class="difficulty easy" id="problemDifficulty">Easy</span>
            <span class="stats">
              <span id="attemptCount">Attempts: 0</span>
            </span>
          </div>
        </div>

        <div class="problem-content">
          <!-- Left: Problem Statement -->
          <div class="problem-statement">
            <div class="section">
              <h3>Description</h3>
              <p id="problemDescription"></p>
            </div>

            <div class="section">
              <h3>Example</h3>
              <div class="example" id="problemExample"></div>
            </div>

            <div class="section">
              <h3>Constraints</h3>
              <p id="problemConstraints"></p>
            </div>
          </div>

          <!-- Right: Code Editor & Controls -->
          <div class="editor-section">
            <div class="timer-bar" id="timerBar">
              <span id="timer">00:00</span>
            </div>

            <div class="editor-container">
              <div class="editor-toolbar">
                <span>Code Editor (C++)</span>
                <div class="editor-actions">
                  <button id="resetBtn" class="btn-small">Reset</button>
                </div>
              </div>
              <div id="editor" style="height: 400px; border: 1px solid #333;"></div>
            </div>

            <div class="execution-section">
              <div class="output-container">
                <div class="output-header">
                  <span>Output</span>
                  <span id="outputStatus"></span>
                </div>
                <div id="output" class="output-box"></div>
              </div>

              <div class="action-buttons">
                <button id="runBtn" class="btn btn-run">Run Code</button>
                <button id="submitBtn" class="btn btn-submit">Submit</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast Notifications -->
  <div id="toast" class="toast"></div>

  <!-- Monaco Editor -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
  <script>
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
  </script>
  <script src="dsa.js"></script>
</body>
</html>
